minimum_pre_commit_version: 3.0.0
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff-format
        name: Ruff format
        stages: [commit]
      - id: ruff
        name: Ruff lint
        stages: [commit]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        name: Type check (mypy)
        additional_dependencies:
          - types-requests
          - jsonschema
          - types-jsonschema
        args: [--ignore-missing-imports]
        stages: [commit]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        name: Security check (bandit)
        args: [-q]
        stages: [commit]

  - repo: https://github.com/crate-ci/typos
    rev: v1.23.2
    hooks:
      - id: typos
        name: Typo check
        stages: [commit]

  - repo: local
    hooks:
      - id: pytest
        name: Unit & contract tests (pytest)
        entry: pytest tests --tb=short --disable-warnings
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
