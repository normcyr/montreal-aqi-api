name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install -e .[dev]

      - name: Lint & format check (ruff)
        run: |
          ruff format --check .
          ruff check .

      - name: Type check (mypy)
        run: mypy montreal_aqi_api --ignore-missing-imports || true

      - name: Unit & contract tests (pytest)
        run: pytest tests --tb=short --disable-warnings

      - name: Test coverage
        run: pytest tests --cov=montreal_aqi_api --cov-report=term-missing --cov-fail-under=95

      - name: Security check (bandit)
        run: bandit -r montreal_aqi_api -q
